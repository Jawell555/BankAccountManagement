<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="assets/src/bank_logo.png" alt="Summit PhilBank Logo" class="logo">
            <h1>Summit PhilBank</h1>
        </div>
        <div class="login-form">
            <form>
                <div class="input-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Log in</button>
            </form>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="assets/js/config/app.js"></script>
    <script type="module" src="assets/js/controllers/script.js"></script>
</body>

</html>
